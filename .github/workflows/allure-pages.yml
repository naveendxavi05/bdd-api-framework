name: 4 — Allure Report + GitHub Pages

on:
  workflow_run:
    workflows: ["2 — Regression Tests"]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  allure-report:
    name: Publish Allure to GitHub Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Regression Allure Results
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: regression.yml
          name: regression-allure-results
          path: target/allure-results

      - name: Get Allure History
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        run: |
          cd allure-history
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git add .
          git commit -m "deploy: Allure report $(date +'%Y-%m-%d %H:%M:%S')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/naveendxavi05/bdd-api-framework.git
          git push origin gh-pages --force